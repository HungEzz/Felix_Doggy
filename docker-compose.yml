version: "3.8"

services:
  # 1. API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: felix_doggy_gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure

  # 2. Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=957845460758-nkum4phpedgrt7mpi1a4o07m2o4ocjhs.apps.googleusercontent.com
    container_name: felix_doggy_frontend
    environment:
      - VITE_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure

  # 3. Backend
  backend:
    build:
      context: ./backend
    container_name: felix_doggy_backend
    environment:
      - DATABASE_URL=postgresql://postgres:root@postgres:5432/record_store?schema=public
      - JWT_SECRET=supersecretkey_for_record_store_2026
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - GOOGLE_CLIENT_ID=957845460758-nkum4phpedgrt7mpi1a4o07m2o4ocjhs.apps.googleusercontent.com
      - CLOUDINARY_CLOUD_NAME=dgtsbqngb
      - CLOUDINARY_API_KEY=636365537737886
      - CLOUDINARY_API_SECRET=Fik1duLzb-J9HZ_eZJiLEZdlJgc
      - PAYOS_CLIENT_ID=your_payos_client_id
      - PAYOS_API_KEY=your_payos_api_key
      - PAYOS_CHECKSUM_KEY=your_payos_checksum_key
      - FRONTEND_URL=http://frontend:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  # 4. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: felix_doggy_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=record_store
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d record_store"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  # 5. Redis Cache
  redis:
    image: redis:alpine
    container_name: felix_doggy_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: on-failure

volumes:
  pgdata:
  backend_uploads:
