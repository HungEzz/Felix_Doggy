  # ── Chat ─────────────────────────────────────────────────────────────────────
  /api/chat:
    post:
      tags: [Chat]
      summary: Send message to AI assistant
      description: |
        Sends a message to the AI shopping assistant. The assistant can search
        products, view orders (for authenticated users), and perform admin
        operations (for admin users). Uses DeepSeek (primary), Gemini (backup),
        or a local keyword fallback.

        Authentication is optional — if a valid Bearer token is provided, the
        assistant gains access to user-specific or admin tools.
      operationId: handleChat
      security:
        - BearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: AI assistant response with optional frontend actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Missing message field.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Message is required"
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          description: AI service or internal error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"
